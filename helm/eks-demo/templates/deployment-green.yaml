apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-demo-green
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: eks-demo
      version: green
  template:
    metadata:
      labels:
        app: eks-demo
        version: green
    spec:
      containers:
      - name: eks-demo
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 3000
